  - {type: variant, offset: 1295, length: 187, content: 南方去此八十七億恒河沙數，世界名解脫，佛號真淨如來，十號具足，告諸菩薩：「汝等見此光明不乎？」對曰：「唯然見之，不審此光是何佛光照〔此〕－【宮】此【大】，〔－〕【宮】此世界？」彼佛告曰：「北方去此八十七億恒河沙數，世界名娑呵，佛號釋迦牟尼，今取滅度，捨身舍利，欲入中陰教化，是妙覺如來光明。汝等欲往，今正是時。」爾時，彼土菩薩百三十億受佛教誡來至忍界。佛告之曰：「汝到彼土親＝禮【三】【宮】親【大】，禮【宋】【元】【明】【宮】親禮事供養，勿懷懈慢，持吾名號問訊妙覺如來：『興居輕利、遊步強耶？』」菩薩受教，禮彼佛足，右繞七匝，忽然不現，來至娑呵世界, 聖: ''}
